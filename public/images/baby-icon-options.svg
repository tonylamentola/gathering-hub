<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" fill="#FAF8F4"/>
  <text x="600" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#1A2459">Baby Shower Icon Options</text>
  <text x="600" y="105" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#64748B">Pick the number that reads best to you at a glance</text>

  <g stroke="#C9A84C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- card backgrounds -->
  </g>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#243175" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- helper cards -->
  <g font-family="Inter, Arial, sans-serif" fill="#1A2459">
    <g transform="translate(90 160)">
      <rect width="220" height="260" rx="26" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="110" y="228" text-anchor="middle" font-size="28" font-weight="700">1</text>
      <!-- bottle -->
      <g transform="translate(72 52)" stroke="#C9A84C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M30 0h16v18c8 3 12 10 12 20v62c0 15-11 26-26 26h-4c-15 0-26-11-26-26V38c0-10 4-17 12-20V0h16"/>
        <path d="M18 46h24"/>
        <path d="M18 68h24"/>
      </g>
    </g>

    <g transform="translate(350 160)">
      <rect width="220" height="260" rx="26" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="110" y="228" text-anchor="middle" font-size="28" font-weight="700">2</text>
      <!-- rattle -->
      <g transform="translate(58 44)" stroke="#C9A84C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <circle cx="52" cy="44" r="32"/>
        <path d="M74 66l34 34"/>
        <path d="M108 100v28"/>
        <path d="M94 128h28"/>
      </g>
    </g>

    <g transform="translate(610 160)">
      <rect width="220" height="260" rx="26" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="110" y="228" text-anchor="middle" font-size="28" font-weight="700">3</text>
      <!-- pacifier -->
      <g transform="translate(60 42)" stroke="#C9A84C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <circle cx="50" cy="54" r="24"/>
        <path d="M50 30V6"/>
        <path d="M28 98c8-11 15-16 22-16s14 5 22 16"/>
        <path d="M38 54h24"/>
      </g>
    </g>

    <g transform="translate(870 160)">
      <rect width="220" height="260" rx="26" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="110" y="228" text-anchor="middle" font-size="28" font-weight="700">4</text>
      <!-- teddy -->
      <g transform="translate(52 34)" stroke="#C9A84C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <circle cx="42" cy="30" r="14"/>
        <circle cx="86" cy="30" r="14"/>
        <circle cx="64" cy="70" r="42"/>
        <circle cx="52" cy="64" r="2" fill="#C9A84C"/>
        <circle cx="76" cy="64" r="2" fill="#C9A84C"/>
        <path d="M56 82c4 4 8 6 8 6s4-2 8-6"/>
      </g>
    </g>

    <g transform="translate(90 480)">
      <rect width="220" height="260" rx="26" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="110" y="228" text-anchor="middle" font-size="28" font-weight="700">5</text>
      <!-- onesie -->
      <g transform="translate(50 34)" stroke="#C9A84C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M42 10c8 8 28 8 36 0l22 20-16 22v58l-20-12-20 12-20-12-20 12V52L-12 30 10 10c8 8 24 8 32 0Z"/>
      </g>
    </g>

    <g transform="translate(350 480)">
      <rect width="220" height="260" rx="26" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="110" y="228" text-anchor="middle" font-size="28" font-weight="700">6</text>
      <!-- stroller -->
      <g transform="translate(40 60)" stroke="#C9A84C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M26 70c0-34 26-60 60-60h8v60H26Z"/>
        <path d="M94 70 126 116"/>
        <circle cx="44" cy="126" r="14"/>
        <circle cx="112" cy="126" r="14"/>
      </g>
    </g>

    <g transform="translate(610 480)">
      <rect width="220" height="260" rx="26" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="110" y="228" text-anchor="middle" font-size="28" font-weight="700">7</text>
      <!-- blocks -->
      <g transform="translate(44 72)" stroke="#C9A84C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <rect x="6" y="36" width="44" height="44" rx="6"/>
        <rect x="50" y="0" width="44" height="44" rx="6"/>
        <rect x="94" y="36" width="44" height="44" rx="6"/>
        <path d="M24 60h8M20 56v8"/>
        <path d="M66 26h12"/>
        <path d="M112 60h10M117 55v10"/>
      </g>
    </g>

    <g transform="translate(870 480)">
      <rect width="220" height="260" rx="26" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="110" y="228" text-anchor="middle" font-size="28" font-weight="700">8</text>
      <!-- moon cradle -->
      <g transform="translate(56 48)" stroke="#C9A84C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M72 16c-10 8-16 21-16 36 0 24 18 44 42 46-7 10-19 16-32 16-24 0-44-20-44-44 0-23 17-42 39-45 4 0 8 0 11 1Z"/>
        <path d="M18 132h92"/>
      </g>
    </g>
  </g>
</svg>
